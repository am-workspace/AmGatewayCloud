services:
  # ── MQTT Broker (EdgeGateway 采集入口) ──
  mosquitto:
    image: eclipse-mosquitto:latest
    container_name: amgw-mosquitto
    ports:
      - "1883:1883"
    volumes:
      - ./docker/mosquitto/mosquitto.conf:/mosquitto/config/mosquitto.conf:ro
    healthcheck:
      test: ["CMD", "mosquitto_sub", "-t", "$$SYS/#", "-C", "1", "-i", "hc", "-W", "3"]
      interval: 10s
      timeout: 5s
      retries: 3

  # ── 本地时序库 (EdgeGateway 断网缓存) ──
  influxdb:
    image: influxdb:latest
    container_name: amgw-influxdb
    ports:
      - "8086:8086"
    entrypoint: ["/bin/sh", "/docker-entrypoint-initdb.d/entrypoint.sh"]
    environment:
      INFLUXD_HTTP_BIND_ADDRESS: ":8086"
    volumes:
      - influxdb-data:/var/lib/influxdb2
      - ./docker/influxdb/entrypoint.sh:/docker-entrypoint-initdb.d/entrypoint.sh:ro
    healthcheck:
      test: ["CMD", "influx", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── 消息队列 (管道层 + 业务层) ──
  rabbitmq:
    image: rabbitmq:latest
    container_name: amgw-rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    command: >
      sh -c "rabbitmq-plugins enable --offline rabbitmq_management &&
             exec rabbitmq-server"
    volumes:
      - ./docker/rabbitmq/init-business-vhost.sh:/init-vhost.sh:ro
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "check_port_connectivity"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ── RabbitMQ 初始化：创建 /business vhost ──
  rabbitmq-init:
    image: rabbitmq:latest
    container_name: amgw-rabbitmq-init
    depends_on:
      rabbitmq:
        condition: service_healthy
    restart: "no"
    entrypoint: ["sh", "-c"]
    command: >
      "rabbitmqctl -n rabbit@amgw-rabbitmq add_vhost /business 2>/dev/null;
       rabbitmqctl -n rabbit@amgw-rabbitmq set_permissions -p /business guest '.*' '.*' '.*';
       echo '/business vhost initialized'"

  # ── 云端时序库 + 业务库 (CloudGateway 写入目标) ──
  timescaledb:
    image: timescale/timescaledb:latest-pg17
    container_name: amgw-tsdb
    ports:
      - "5432:5432"
    environment:
      TZ: Asia/Shanghai
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: amgateway_timeseries
    volumes:
      - tsdb-data:/var/lib/postgresql/data
      - ./docker/init-db.sql:/docker-entrypoint-initdb.d/init-db.sql
      - ./docker/alarm-init.sql:/docker-entrypoint-initdb.d/02-alarm-init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ── 报警评估服务 (Phase 4) ──
  alarm-service:
    build:
      context: .
      dockerfile: docker/alarm-service/Dockerfile
    container_name: amgw-alarm-service
    ports:
      - "5001:5001"
    depends_on:
      rabbitmq-init:
        condition: service_completed_successfully
      timescaledb:
        condition: service_healthy
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      AlarmService__TenantId: default
      AlarmService__EvaluationIntervalSeconds: "5"
      AlarmService__EvaluationLookbackSeconds: "30"
      AlarmService__MaxConsecutiveErrors: "10"
      AlarmService__RuleCacheRefreshSeconds: "30"
      AlarmService__MaxQueryWindowHours: "1"
      AlarmService__DeviceOfflineThresholdMinutes: "10"
      AlarmService__TimescaleDb__Host: timescaledb
      AlarmService__TimescaleDb__Port: "5432"
      AlarmService__TimescaleDb__Database: amgateway_timeseries
      AlarmService__TimescaleDb__Username: postgres
      AlarmService__TimescaleDb__Password: postgres
      AlarmService__PostgreSql__Host: timescaledb
      AlarmService__PostgreSql__Port: "5432"
      AlarmService__PostgreSql__Database: amgateway_business
      AlarmService__PostgreSql__Username: sa
      AlarmService__PostgreSql__Password: sa
      AlarmService__RabbitMq__HostName: rabbitmq
      AlarmService__RabbitMq__Port: "5672"
      AlarmService__RabbitMq__VirtualHost: /business
      AlarmService__RabbitMq__Username: guest
      AlarmService__RabbitMq__Password: guest
      AlarmService__RabbitMq__Exchange: amgateway.alarms
    restart: unless-stopped

  # ── 报警 WebApi / BFF (Phase 4) ──
  webapi:
    build:
      context: .
      dockerfile: docker/webapi/Dockerfile
    container_name: amgw-webapi
    ports:
      - "8080:8080"
    depends_on:
      alarm-service:
        condition: service_started
      rabbitmq-init:
        condition: service_completed_successfully
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      WebApi__CorsOrigins__0: "http://localhost:5173"
      WebApi__CorsOrigins__1: "http://localhost"
      WebApi__CorsOrigins__2: "http://amgw-web"
      WebApi__RabbitMq__HostName: rabbitmq
      WebApi__RabbitMq__Port: "5672"
      WebApi__RabbitMq__VirtualHost: /business
      WebApi__RabbitMq__Username: guest
      WebApi__RabbitMq__Password: guest
      WebApi__RabbitMq__Exchange: amgateway.alarms
      WebApi__RabbitMq__QueueName: amgateway.alarm-notifications
      ReverseProxy__Clusters__alarm-service__Destinations__default__Address: "http://alarm-service:5001"
      ReverseProxy__Clusters__workorder-service__Destinations__default__Address: "http://workorder-service:5002"
    restart: unless-stopped

  # ── 维修工单服务 (Phase 6) ──
  workorder-service:
    build:
      context: .
      dockerfile: docker/workorder-service/Dockerfile
    container_name: amgw-workorder-service
    ports:
      - "5002:5002"
    depends_on:
      rabbitmq-init:
        condition: service_completed_successfully
      timescaledb:
        condition: service_healthy
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      WorkOrderService__TenantId: default
      WorkOrderService__AutoCreateOnAlarm: "true"
      WorkOrderService__PostgreSql__Host: timescaledb
      WorkOrderService__PostgreSql__Port: "5432"
      WorkOrderService__PostgreSql__Database: amgateway_business
      WorkOrderService__PostgreSql__Username: sa
      WorkOrderService__PostgreSql__Password: sa
      WorkOrderService__RabbitMq__HostName: rabbitmq
      WorkOrderService__RabbitMq__Port: "5672"
      WorkOrderService__RabbitMq__VirtualHost: /business
      WorkOrderService__RabbitMq__Username: guest
      WorkOrderService__RabbitMq__Password: guest
      WorkOrderService__RabbitMq__Exchange: amgateway.alarms
      WorkOrderService__RabbitMq__QueueName: amgateway.workorder.alarm-events
    restart: unless-stopped

  # ── 前端看板 (Phase 5) ──
  web:
    build:
      context: .
      dockerfile: docker/web/Dockerfile
    container_name: amgw-web
    ports:
      - "80:80"
    depends_on:
      webapi:
        condition: service_started
    restart: unless-stopped

volumes:
  influxdb-data:
  tsdb-data:
